repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        # This is the key fix
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - types-psycopg2
          - langchain-core
          - structlog
        # Pass the project config explicitly
        args:
          - --config-file=pyproject.toml
          - --no-strict-optional
