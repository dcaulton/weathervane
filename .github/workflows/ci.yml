name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pre-commit run --all-files
      - run: uv run mypy src
      - run: uv run pytest --cov=weathervane --cov-report=xml
