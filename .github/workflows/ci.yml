name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6   # Updated to v6 (Node 24 compatible)

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0 (latest)
        with:
          version: "latest"        # or pin e.g. "0.11.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Type checking with mypy
        run: uv run mypy src

      - name: Run tests with coverage
        run: uv run pytest --cov=weathervane --cov-report=xml

      # Optional: Build check (useful once you add packaging)
      # - name: Build package
      #   run: uv build
